<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phasmo Buddy</title>

<style>
body{margin:0;background:#0b0e13;color:#fff;font-family:Arial}
.wrap{max-width:1100px;margin:auto;padding:10px}
.panel{background:#161a22;border-radius:10px;padding:10px;margin-bottom:10px}

button{
  padding:8px;
  margin:3px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#fff;
}

.on{background:#1f8f4e}
.off{background:#a73b3b}

.ghosts{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.ghost{
  padding:10px;
  border-radius:10px;
}

.ok{background:#1f8f4e}
.sus{background:#a67c00}
.no{background:#a73b3b}

.small{font-size:12px;opacity:0.9}

</style>
</head>

<body>
<div class="wrap">

<div class="panel">
<b>Evidencias</b><br>
<div id="ev"></div>
</div>

<div class="panel">
<b>Velocidad</b><br>
<button id="speedBtn">Sin info</button>
</div>

<div class="panel">
<b>Especiales</b><br>
<button onclick="toggle('salt')">Pisa sal</button>
<button onclick="toggle('dots')">DOTS visible directo</button>
</div>

<div class="panel">
<b>Fantasmas</b>
<div class="ghosts" id="ghosts"></div>
</div>

</div>

<script>

const evidences=["EMF","SpiritBox","Writing","DOTS","Freezing","Orbs","UV"];
let evState={};
evidences.forEach(e=>evState[e]=0);

let specials={
  salt:false,
  dots:false
};

let speedStates=["Sin info","Lento","Rápido","Variable"];
let speedIndex=0;

const ghosts=[

{name:"Spirit",ev:["EMF","SpiritBox","Writing"],info:["Neutral","Sin rasgos claros","Test incienso"]},

{name:"Wraith",ev:["EMF","SpiritBox","DOTS"],info:["No pisa sal","Flota","Usa sal"],rules:["noSalt"]},

{name:"Phantom",ev:["SpiritBox","UV","DOTS"],info:["Desaparece en foto","Menos visible","Haz foto"]},

{name:"Poltergeist",ev:["SpiritBox","UV","Writing"],info:["Lanza objetos","Muy activo","Amontona objetos"]},

{name:"Banshee",ev:["UV","Orbs","DOTS"],info:["Objetivo único","Persigue a uno","Parabólica"]},

{name:"Jinn",ev:["EMF","UV","Freezing"],info:["Rápido lejos","Depende de energía","Corta luz"]},

{name:"Mare",ev:["SpiritBox","Orbs","Writing"],info:["Apaga luces","Ama oscuridad","Enciende luz"]},

{name:"Revenant",ev:["Orbs","Writing","Freezing"],info:["Muy lento","Muy rápido","Linea visión"],speed:"Variable"},

{name:"Shade",ev:["EMF","Writing","Freezing"],info:["Poco activo","Evita gente","Quédate solo"]},

{name:"Demon",ev:["UV","Writing","Freezing"],info:["Hunt temprano","Agresivo","Cuidado temprano"]},

{name:"Yurei",ev:["Orbs","Freezing","DOTS"],info:["Afecta cordura","Puertas","Observa puertas"]},

{name:"Oni",ev:["EMF","Freezing","DOTS"],info:["Muy activo","Muchos eventos","Alta actividad"]},

{name:"Yokai",ev:["SpiritBox","Orbs","DOTS"],info:["Detecta voz","Cerca oye","Habla lejos"]},

{name:"Hantu",ev:["UV","Orbs","Freezing"],info:["Rápido frío","Lento calor","Controla temp"],speed:"Rápido"},

{name:"Goryo",ev:["EMF","UV","DOTS"],info:["DOTS cámara","No visible directo","Usa cámara"],rules:["dotsOnly"]},

{name:"Myling",ev:["EMF","UV","Writing"],info:["Silencioso","Pasos raros","Escucha bien"]},

{name:"Onryo",ev:["SpiritBox","Orbs","Freezing"],info:["Fuego afecta","Caza por velas","Usa velas"]},

{name:"Twins",ev:["EMF","SpiritBox","Freezing"],info:["Dos acciones","Velocidad distinta","Observa doble"]},

{name:"Raiju",ev:["EMF","Orbs","DOTS"],info:["Rápido con electrónica","Acelera","Apaga equipo"],speed:"Rápido"},

{name:"Obake",ev:["EMF","UV","Orbs"],info:["Huellas raras","Cambios","Mira UV"]},

{name:"Mimic",ev:["SpiritBox","UV","Freezing"],info:["Orbes falsos","Imita","Busca orbes"]},

{name:"Moroi",ev:["SpiritBox","Writing","Freezing"],info:["Rápido cordura baja","Debilita","Toma pastillas"],speed:"Rápido"},

{name:"Deogen",ev:["SpiritBox","Writing","DOTS"],info:["Siempre detecta","Te sigue","Cerca lento"],speed:"Variable"},

{name:"Thaye",ev:["Orbs","Writing","DOTS"],info:["Rápido inicio","Envejece","Se vuelve lento"],speed:"Variable"}

];

function toggle(k){
  specials[k]=!specials[k];
  render();
}

document.getElementById("speedBtn").onclick=()=>{
  speedIndex=(speedIndex+1)%speedStates.length;
  document.getElementById("speedBtn").textContent=speedStates[speedIndex];
  render();
};

function render(){

let evDiv=document.getElementById("ev");
evDiv.innerHTML="";

evidences.forEach(e=>{
  let b=document.createElement("button");
  b.textContent=e;

  if(evState[e]==1)b.className="on";
  if(evState[e]==2)b.className="off";

  b.onclick=()=>{
    evState[e]=(evState[e]+1)%3;
    render();
  };

  evDiv.appendChild(b);
});

let gDiv=document.getElementById("ghosts");
gDiv.innerHTML="";

ghosts.forEach(g=>{

let valid=true;
let score=0;

evidences.forEach(e=>{
  if(evState[e]==1 && !g.ev.includes(e)) valid=false;
  if(evState[e]==2 && g.ev.includes(e)) valid=false;
});

// especiales (DESCARTE REAL)
if(specials.salt && g.rules?.includes("noSalt")) valid=false;
if(specials.dots && g.rules?.includes("dotsOnly")) valid=false;

// velocidad (peso)
if(g.speed && g.speed===speedStates[speedIndex]) score++;

let cls="ghost ";

if(!valid) cls+="no";
else if(score>0) cls+="sus";
else cls+="ok";

let d=document.createElement("div");

d.className=cls;
d.innerHTML=
"<b>"+g.name+"</b><br>"+
"<span class='small'>⚡ "+g.info[0]+"<br>🎯 "+g.info[1]+"<br>🧂 "+g.info[2]+"</span>";

gDiv.appendChild(d);

});

}

render();

</script>
</body>
</html>
